name: G4F Multi-Server Renew

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 08:00 自动运行
  workflow_dispatch:     # 支持手动/API 请求触发

jobs:
  renew:
    runs-on: ubuntu-24.04

    steps:
      # 1. 检出仓库中的代码
     # - name: Checkout repository code
      #  uses: actions/checkout@v4

      # 2. 设置 Python 3.12 环境（已移除 cache 配置）
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 安装依赖系统库及 python 包
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cloakbrowser
          python -m playwright install chromium
          python -m playwright install-deps chromium

      # 4. 运行您的续期脚本
      # 注意：请确保你仓库里的 Python 脚本文件名叫 renew.py，如果不是，请把下方修改为实际文件名
      - name: Run G4F Renew Script
        run: |
          python renew.py
