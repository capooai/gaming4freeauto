name: G4F Renew Via VPNGate

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  renew:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          sudo apt update

          python -m pip install --upgrade pip

          pip install cloakbrowser playwright requests

          python -m playwright install chromium
          python -m playwright install-deps chromium

      ####################################################
      # 安装 AimiliVPN
      ####################################################

      - name: Clone AimiliVPN
        run: |
          git clone https://github.com/baoweise-bot/aimili-vpngate.git

      - name: Install AimiliVPN
        run: |
          cd aimili-vpngate

          chmod +x *.sh || true

          sudo bash install.sh

      ####################################################
      # 当前出口
      ####################################################

      - name: Check Original IP
        run: |
          echo "===== DIRECT ====="
          curl -s https://api.ipify.org
          echo

      ####################################################
      # 查看 AimiliVPN 状态
      ####################################################

      - name: Check AimiliVPN Status
        run: |
          echo "===== WHICH ML ====="
          which ml || true

          echo
          echo "===== ML STATUS ====="
          ml status || true

          echo
          echo "===== PROCESS ====="
          ps aux | grep -Ei "mihomo|clash|xray|sing-box|vpn" || true

      ####################################################
      # 等待节点连接
      ####################################################

      - name: Wait VPN
        run: |
          sleep 60

      ####################################################
      # 检查监听端口
      ####################################################

      - name: Check SOCKS5 Port
        run: |
          echo "===== PORT 7928 ====="

          ss -lntp || true

          echo
          netstat -lntp 2>/dev/null || true

      ####################################################
      # 查看日志
      ####################################################

      - name: Show AimiliVPN Logs
        run: |
          echo "===== ML LOGS ====="

          ml logs || true

      ####################################################
      # 测试 SOCKS5
      ####################################################

      - name: Verify SOCKS5 Proxy
        run: |
          echo "===== DIRECT IP ====="

          curl -s https://api.ipify.org
          echo

          echo
          echo "===== SOCKS5 IP ====="

          curl \
            --connect-timeout 30 \
            --socks5-hostname 127.0.0.1:7928 \
            https://api.ipify.org || true

          echo

          echo
          echo "===== SOCKS5 PING0 ====="

          curl \
            --connect-timeout 30 \
            --socks5-hostname 127.0.0.1:7928 \
            https://ping0.cc/ip || true

          echo

      ####################################################
      # 测试目标站点
      ####################################################

      - name: Test G4F Through SOCKS5
        run: |
          curl \
            -I \
            --connect-timeout 30 \
            --socks5-hostname 127.0.0.1:7928 \
            https://g4f.gg/deku || true

      ####################################################
      # 执行续期
      ####################################################

      - name: Run Renew
        env:
          ALL_PROXY: socks5://127.0.0.1:7928
          HTTP_PROXY: socks5://127.0.0.1:7928
          HTTPS_PROXY: socks5://127.0.0.1:7928
        run: |
          python renew.py

      ####################################################
      # 上传日志
      ####################################################

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g4f-renew-logs
          path: |
            *.log
            vpn.log
