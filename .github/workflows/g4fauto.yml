name: G4F Renew Via VPNGate

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  renew:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          sudo apt update

          python -m pip install --upgrade pip

          pip install cloakbrowser playwright requests

          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Clone AimiliVPN
        run: |
          git clone https://github.com/baoweise-bot/aimili-vpngate.git

      - name: Install AimiliVPN
        run: |
          cd aimili-vpngate
          chmod +x *.sh || true
          sudo bash install.sh

      - name: Show Status
        run: |
          sudo ml status || true

      - name: Wait VPN Bootstrap
        run: |
          echo "Waiting for VPN node selection..."
          sleep 240

      - name: Check Port
        run: |
          sudo ss -lntp | grep 7928 || true

      - name: Wait For SOCKS5 Ready
        run: |
          for i in {1..20}; do

            echo "Attempt $i"

            if curl \
              --silent \
              --max-time 20 \
              --socks5-hostname 127.0.0.1:7928 \
              https://api.ipify.org
            then
              echo
              echo "SOCKS5 READY"
              exit 0
            fi

            sleep 15

          done

          echo "SOCKS5 NOT READY"
          exit 1

      - name: Verify Exit IP
        run: |
          echo "===== DIRECT ====="
          curl -s https://api.ipify.org
          echo

          echo "===== SOCKS5 ====="
          curl \
            --socks5-hostname 127.0.0.1:7928 \
            https://api.ipify.org
          echo

          echo "===== PING0 ====="
          curl \
            --socks5-hostname 127.0.0.1:7928 \
            https://ping0.cc/ip
          echo

      - name: Show VPN Logs
        run: |
          sudo ml logs || true

      - name: Run Renew
        env:
          ALL_PROXY: socks5://127.0.0.1:7928
          HTTP_PROXY: socks5://127.0.0.1:7928
          HTTPS_PROXY: socks5://127.0.0.1:7928
        run: |
          python renew.py

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g4f-renew-logs
          path: |
            *.log
